<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic 3D Bathroom Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 1px;
            pointer-events: none;
            transition: opacity 1s ease-out;
            background: rgba(15, 15, 15, 0.85);
            padding: 30px 50px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            flex-direction: column;
            gap: 15px;
            z-index: 999;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #d9aa38; /* สีเหลืองจากกระเบื้อง */
            animation: spin 1s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            z-index: 10;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>กำลังประมวลผลฉากและพื้นผิว 3D ขั้นสูง...</div>
    </div>
    <div id="instructions">ใช้เมาส์คลิกซ้ายเพื่อหมุน / สกอร์ลเพื่อซูม / คลิกขวาเพื่อเลื่อน</div>

    <script>
        const scene = new THREE.Scene();
        // สีพื้นหลังเป็นสีขาวครีมอ่อนๆ เพื่อให้ดูกลืนกับฉาก
        scene.background = new THREE.Color(0xfcfbf9); 

        // ขนาดห้อง
        const w = 3.6; // ความกว้าง
        const d = 4.2; // ความลึก
        const h = 2.9; // ความสูง
        const dadoHeight = 1.15; // ความสูงของผนังครึ่งล่าง (Terrazzo)

        // ตั้งกล้องไว้ที่หน้าประตู มองเข้าไปด้านใน
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(1.0, 1.5, 3.8); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // เงาเนียนนุ่มสมจริง
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.15; // ปรับความสว่างรวมของภาพ
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(-0.2, 1.2, -0.2); // โฟกัสไปที่กลางห้องค่อนไปทางซ้าย (จุดกึ่งกลางระหว่างชักโครกและฝักบัว)
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // ป้องกันการมุดใต้พื้น
        controls.minDistance = 1;
        controls.maxDistance = 6;

        const materials = {};

        // --- ระบบสร้างภาพ Texture แบบ 2D (เหมือนเอาภาพมาแปะ) ---

        // 1. สร้างภาพ Terrazzo (หินขัด)
        function createTerrazzoTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            // สีพื้น (ครีมอ่อน)
            ctx.fillStyle = '#f5f2eb'; 
            ctx.fillRect(0, 0, 1024, 1024);

            // สีเม็ดหิน (ดูดจากภาพเป๊ะๆ)
            const flakeColors = ['#d36a42', '#dfaa3a', '#363837', '#a49f96', '#cfc8b9'];
            
            // วาดเม็ดหิน 15,000 ชิ้น
            for (let i = 0; i < 15000; i++) {
                ctx.fillStyle = flakeColors[Math.floor(Math.random() * flakeColors.length)];
                const x = Math.random() * 1024;
                const y = Math.random() * 1024;
                // สุ่มขนาดเม็ดหิน
                const size = Math.random() > 0.9 ? (Math.random() * 12 + 5) : (Math.random() * 4 + 1); 
                
                ctx.beginPath();
                // วาดทรงหลายเหลี่ยมให้ดูเป็นเศษหิน
                const sides = Math.floor(Math.random() * 4) + 3;
                for (let j = 0; j < sides; j++) {
                    const angle = (j / sides) * Math.PI * 2;
                    const rad = size * (0.5 + Math.random() * 0.5);
                    if (j === 0) ctx.moveTo(x + Math.cos(angle) * rad, y + Math.sin(angle) * rad);
                    else ctx.lineTo(x + Math.cos(angle) * rad, y + Math.sin(angle) * rad);
                }
                ctx.closePath();
                ctx.fill();
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        // 2. สร้างภาพกระเบื้อง Tetris
        function createTileTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            const cols = 16, rows = 16;
            const size = 1024 / cols;
            const grout = 4; // ร่องยาแนว
            
            // พาสเทลเป๊ะตามภาพ
            const cWhite = '#f9f9f9'; // กระเบื้องขาว
            const cGrout = '#e0e0e0'; // ยาแนว
            const cYellow = '#e8b839'; 
            const cOrange = '#d06a41'; 
            const cNavy = '#375276';   
            const cGreen = '#6c8d7b';  
            const cPink = '#e6aca7';   
            const cBrown = '#99634e';
            const cBlue = '#9cb8c9';

            // ทาสียาแนวก่อน
            ctx.fillStyle = cGrout;
            ctx.fillRect(0, 0, 1024, 1024);

            // ทากระเบื้องขาวทุกช่อง
            for (let x = 0; x < cols; x++) {
                for (let y = 0; y < rows; y++) {
                    ctx.fillStyle = cWhite;
                    ctx.fillRect(x * size + grout/2, y * size + grout/2, size - grout, size - grout);
                }
            }

            // ฟังก์ชันทาสีกระเบื้องเฉพาะจุด (Grid X, Y)
            function fillTile(x, y, color) {
                if(x < 0 || x >= cols || y < 0 || y >= rows) return;
                ctx.fillStyle = color;
                ctx.fillRect(x * size + grout/2, y * size + grout/2, size - grout, size - grout);
            }

            // --- จัดวางรูปทรง Tetris แบบ Fix ตำแหน่งให้เหมือนภาพ ---
            // กลุ่ม 1: Navy L-Shape
            fillTile(12, 10, cNavy); fillTile(12, 11, cNavy); fillTile(13, 11, cNavy);
            // กลุ่ม 2: Orange L-Shape
            fillTile(13, 4, cOrange); fillTile(13, 5, cOrange); fillTile(12, 5, cOrange);
            // กลุ่ม 3: Yellow 2x1
            fillTile(13, 2, cYellow); fillTile(14, 2, cYellow);
            // กลุ่ม 4: Pink Dot
            fillTile(1, 3, cPink);
            // กลุ่ม 5: Green Dot
            fillTile(14, 7, cGreen);
            // กลุ่ม 6: Pink L-Shape
            fillTile(15, 8, cPink); fillTile(15, 9, cPink); fillTile(14, 9, cPink);
            // กลุ่ม 7: Blue Dot
            fillTile(10, 2, cBlue);
            // กลุ่ม 8: Orange Dot
            fillTile(8, 8, cOrange);
            // กลุ่ม 9: Yellow L-Shape
            fillTile(4, 9, cYellow); fillTile(4, 10, cYellow); fillTile(5, 10, cYellow);
            // กลุ่ม 10: Navy L-Shape คว่ำ
            fillTile(3, 13, cNavy); fillTile(4, 13, cNavy); fillTile(4, 14, cNavy);
            // กลุ่ม 11: Pink Block
            fillTile(3, 7, cPink); fillTile(4, 7, cPink); fillTile(3, 8, cPink); fillTile(4, 8, cPink);
            // กลุ่ม 12: Green I-Shape
            fillTile(10, 6, cGreen); fillTile(10, 7, cGreen);
            // กลุ่ม 13: Brown Dot
            fillTile(15, 1, cBrown);
            // กลุ่ม 14: Orange Dot ล่าง
            fillTile(14, 13, cOrange);
            // กลุ่ม 15: Yellow block ขวา
            fillTile(13, 14, cYellow); fillTile(13, 15, cYellow);
            // กลุ่ม 16: Brown Dot กลาง
            fillTile(8, 14, cBrown);
            // กลุ่ม 17: Blue Dot
            fillTile(2, 5, cBlue);

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        // 3. สร้างภาพลายไม้
        function createWoodTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#dcb98a'; // สีไม้อ่อน
            ctx.fillRect(0, 0, 512, 1024);
            
            // วาดเส้นลายไม้
            ctx.fillStyle = '#c09562';
            for(let i=0; i<300; i++) {
                const x = Math.random() * 512;
                const w = Math.random() * 4 + 1;
                ctx.globalAlpha = Math.random() * 0.5;
                ctx.fillRect(x, 0, w, 1024);
            }
            
            // วาดรอยต่อแผ่นไม้
            ctx.fillStyle = '#8a6034';
            ctx.globalAlpha = 0.8;
            for(let x=0; x<512; x+=64) {
                ctx.fillRect(x, 0, 3, 1024);
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        // นำภาพ 2D ที่สร้างไว้มาเป็น Texture (แปะลง 3D)
        const texTerrazzo = createTerrazzoTexture();
        texTerrazzo.repeat.set(w * 0.8, d * 0.8); // ปรับสเกลลายหินขัดบนพื้น
        
        const texTile = createTileTexture();
        texTile.repeat.set(1.5, 1.5); // ปรับสเกลกระเบื้องตารางบนผนัง
        
        const texWood = createWoodTexture();
        texWood.repeat.set(2.0, 1.0);

        // เปลี่ยน Material เป็นแบบแปะภาพ (Texture Map)
        const terrazzoMaterial = new THREE.MeshStandardMaterial({ 
            map: texTerrazzo, 
            roughness: 0.6 
        });

        const tileMaterial = new THREE.MeshStandardMaterial({ 
            map: texTile, 
            roughness: 0.3 
        });

        const woodMaterial = new THREE.MeshStandardMaterial({ 
            map: texWood, 
            roughness: 0.7 
        });

        const woodTrimMat = new THREE.MeshStandardMaterial({ color: 0xd9b382, roughness: 0.6 });
        const darkWoodMat = new THREE.MeshStandardMaterial({ color: 0x4a3424, roughness: 0.8 });
        const whiteCeramic = new THREE.MeshStandardMaterial({ color: 0xfcfcfc, roughness: 0.1, metalness: 0.05 });
        const chromeMat = new THREE.MeshStandardMaterial({ color: 0xe0e0e0, roughness: 0.15, metalness: 0.9 });
        
        const glassMat = new THREE.MeshStandardMaterial({ 
            color: 0xcce6ff, // สีฟ้าอ่อนๆ เพื่อให้เห็นเนื้อกระจก
            transparent: true, 
            opacity: 0.3,   // ปรับทึบขึ้นให้ไม่ล่องหน
            roughness: 0.05, 
            metalness: 0.6, // เพิ่มความเงาสะท้อนแสงไฟ
            side: THREE.DoubleSide
        });


        const roomGroup = new THREE.Group();
        scene.add(roomGroup);

        // 1. พื้น (Terrazzo)
        const floorGeo = new THREE.PlaneGeometry(w, d);
        const floor = new THREE.Mesh(floorGeo, terrazzoMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        roomGroup.add(floor);

        // 2. เพดาน (ขาวเรียบ)
        const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(w, d), new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 1.0}));
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.y = h;
        roomGroup.add(ceiling);

        // ตำแหน่งของผนังเตี้ย (Partition) แยกโซนเปียกแห้ง
        // โซนเปียกอยู่ด้านใน (z ติดลบ), โซนแห้งอยู่ด้านนอก (z เป็นบวก)
        const partZ = -0.4; // ระยะ Z ของกำแพงกั้น
        const partW = 1.6; // ความกว้างกำแพงกั้น (ยื่นจากซ้ายมาขวา)
        
        // 3. ผนังด้านหลัง (หลังสุด Z = -d/2) -> Niche & Window
        const backWallGroup = new THREE.Group();
        backWallGroup.position.set(0, 0, -d/2);
        
        // Terrazzo ล่าง
        const bwBot = new THREE.Mesh(new THREE.PlaneGeometry(w, dadoHeight), terrazzoMaterial);
        bwBot.position.set(0, dadoHeight/2, 0);
        bwBot.receiveShadow = true;
        backWallGroup.add(bwBot);
        
        // คิ้วไม้กลาง
        const bwTrim = new THREE.Mesh(new THREE.BoxGeometry(w, 0.03, 0.02), woodTrimMat);
        bwTrim.position.set(0, dadoHeight, 0.01);
        backWallGroup.add(bwTrim);

        // Tiles บน + เจาะช่อง Niche และ หน้าต่าง
        const nW = 1.3, nH = 0.35, nD = 0.15;
        const nY = dadoHeight + 0.15 + nH/2; // ตำแหน่ง Niche
        const winW = 0.65, winH = 0.45;
        const winY = nY + nH/2 + 0.25 + winH/2; // ตำแหน่งหน้าต่าง

        // ใช้ Plane ต่อกันเพื่อหลีกเลี่ยงการเจาะรู (CSG) ที่กินสเปค
        const t1 = new THREE.Mesh(new THREE.PlaneGeometry(w, nY - nH/2 - dadoHeight), tileMaterial);
        t1.position.set(0, dadoHeight + (nY - nH/2 - dadoHeight)/2, 0); backWallGroup.add(t1);
        const t2 = new THREE.Mesh(new THREE.PlaneGeometry((w-nW)/2, nH), tileMaterial);
        t2.position.set(-w/4 - nW/4, nY, 0); backWallGroup.add(t2);
        const t3 = new THREE.Mesh(new THREE.PlaneGeometry((w-nW)/2, nH), tileMaterial);
        t3.position.set(w/4 + nW/4, nY, 0); backWallGroup.add(t3);
        const t4 = new THREE.Mesh(new THREE.PlaneGeometry(w, winY - winH/2 - (nY + nH/2)), tileMaterial);
        t4.position.set(0, nY + nH/2 + (winY - winH/2 - (nY + nH/2))/2, 0); backWallGroup.add(t4);
        const t5 = new THREE.Mesh(new THREE.PlaneGeometry((w-winW)/2, winH), tileMaterial);
        t5.position.set(-w/4 - winW/4, winY, 0); backWallGroup.add(t5);
        const t6 = new THREE.Mesh(new THREE.PlaneGeometry((w-winW)/2, winH), tileMaterial);
        t6.position.set(w/4 + winW/4, winY, 0); backWallGroup.add(t6);
        const topRem = h - (winY + winH/2);
        const t7 = new THREE.Mesh(new THREE.PlaneGeometry(w, topRem), tileMaterial);
        t7.position.set(0, h - topRem/2, 0); backWallGroup.add(t7);

        roomGroup.add(backWallGroup);

        // 4. Niche (ชั้นวางของเจาะผนังด้านหลัง)
        const nicheGroup = new THREE.Group();
        nicheGroup.position.set(0, nY, -d/2);
        
        // กรอบไม้บุใน Niche
        const nBack = new THREE.Mesh(new THREE.PlaneGeometry(nW, nH), woodTrimMat);
        nBack.position.set(0, 0, -nD); nicheGroup.add(nBack);
        const nBot = new THREE.Mesh(new THREE.PlaneGeometry(nW, nD), woodTrimMat);
        nBot.rotation.x = -Math.PI/2; nBot.position.set(0, -nH/2, -nD/2); nBot.receiveShadow = true; nicheGroup.add(nBot);
        const nTop = new THREE.Mesh(new THREE.PlaneGeometry(nW, nD), woodTrimMat);
        nTop.rotation.x = Math.PI/2; nTop.position.set(0, nH/2, -nD/2); nicheGroup.add(nTop);
        const nL = new THREE.Mesh(new THREE.PlaneGeometry(nD, nH), woodTrimMat);
        nL.rotation.y = Math.PI/2; nL.position.set(-nW/2, 0, -nD/2); nicheGroup.add(nL);
        const nR = new THREE.Mesh(new THREE.PlaneGeometry(nD, nH), woodTrimMat);
        nR.rotation.y = -Math.PI/2; nR.position.set(nW/2, 0, -nD/2); nicheGroup.add(nR);
        
        // ไฟ LED Strip ซ่อนขอบบน Niche
        const nicheLight = new THREE.RectAreaLight(0xffb55a, 4.0, nW - 0.05, 0.05); // สีส้มอมเหลือง Warm
        nicheLight.position.set(0, nH/2 - 0.01, -nD/2);
        nicheLight.lookAt(0, -nH/2, -nD/2);
        nicheGroup.add(nicheLight);
        
        roomGroup.add(nicheGroup);

        // 5. หน้าต่าง (Window) เหนือ Niche
        const winGroup = new THREE.Group();
        winGroup.position.set(0, winY, -d/2);
        // กรอบไม้เข้ม
        const fT = new THREE.Mesh(new THREE.BoxGeometry(winW, 0.05, 0.12), darkWoodMat);
        fT.position.set(0, winH/2, 0); winGroup.add(fT);
        const fB = new THREE.Mesh(new THREE.BoxGeometry(winW, 0.05, 0.12), darkWoodMat);
        fB.position.set(0, -winH/2, 0); winGroup.add(fB);
        const fL = new THREE.Mesh(new THREE.BoxGeometry(0.05, winH, 0.12), darkWoodMat);
        fL.position.set(-winW/2, 0, 0); winGroup.add(fL);
        const fR = new THREE.Mesh(new THREE.BoxGeometry(0.05, winH, 0.12), darkWoodMat);
        fR.position.set(winW/2, 0, 0); winGroup.add(fR);
        // กระจกหน้าต่าง
        const wGlass = new THREE.Mesh(new THREE.PlaneGeometry(winW-0.1, winH-0.1), 
            new THREE.MeshBasicMaterial({color: 0xccffff, transparent: true, opacity: 0.7}));
        winGroup.add(wGlass);
        // แสงสว่างลอดเข้ามา
        const winLight = new THREE.DirectionalLight(0xeef5ff, 0.8);
        winLight.position.set(0, winY + 1, -d/2 - 2);
        winLight.target.position.set(0, winY-1, 0);
        winLight.castShadow = true;
        winLight.shadow.mapSize.width = 1024;
        winLight.shadow.mapSize.height = 1024;
        scene.add(winLight);
        scene.add(winLight.target);
        
        roomGroup.add(winGroup);

        // 6. ผนังขวา (ขวาสุด)
        const rightWall = new THREE.Group();
        rightWall.position.set(w/2, 0, 0);
        rightWall.rotation.y = -Math.PI/2;
        
        const rwBot = new THREE.Mesh(new THREE.PlaneGeometry(d, dadoHeight), terrazzoMaterial);
        rwBot.position.set(0, dadoHeight/2, 0); rwBot.receiveShadow = true; rightWall.add(rwBot);
        const rwTrim = new THREE.Mesh(new THREE.BoxGeometry(d, 0.03, 0.02), woodTrimMat);
        rwTrim.position.set(0, dadoHeight, 0.01); rightWall.add(rwTrim);
        const rwTop = new THREE.Mesh(new THREE.PlaneGeometry(d, h - dadoHeight), tileMaterial);
        rwTop.position.set(0, dadoHeight + (h-dadoHeight)/2, 0); rightWall.add(rwTop);
        roomGroup.add(rightWall);

        // 7. ผนังซ้าย (แบ่งเป็นโซนเปียก-ลายไม้ และโซนแห้ง-Terrazzo)
        // โซนเปียก (หลังกำแพงกั้น, Z = -d/2 ถึง partZ)
        const wetDepth = Math.abs(-d/2 - partZ);
        const wetLeftWall = new THREE.Mesh(new THREE.PlaneGeometry(wetDepth, h), woodMaterial);
        wetLeftWall.rotation.y = Math.PI/2;
        wetLeftWall.position.set(-w/2, h/2, -d/2 + wetDepth/2);
        wetLeftWall.receiveShadow = true;
        roomGroup.add(wetLeftWall);

        // โซนแห้ง (หน้ากำแพงกั้น, Z = partZ ถึง d/2)
        const dryDepth = d/2 - partZ;
        const dryLeftWall = new THREE.Group();
        dryLeftWall.position.set(-w/2, 0, partZ + dryDepth/2);
        dryLeftWall.rotation.y = Math.PI/2;
        const lwBot = new THREE.Mesh(new THREE.PlaneGeometry(dryDepth, dadoHeight), terrazzoMaterial);
        lwBot.position.set(0, dadoHeight/2, 0); dryLeftWall.add(lwBot);
        const lwTrim = new THREE.Mesh(new THREE.BoxGeometry(dryDepth, 0.03, 0.02), woodTrimMat);
        lwTrim.position.set(0, dadoHeight, 0.01); dryLeftWall.add(lwTrim);
        const lwTop = new THREE.Mesh(new THREE.PlaneGeometry(dryDepth, h - dadoHeight), tileMaterial);
        lwTop.position.set(0, dadoHeight + (h-dadoHeight)/2, 0); dryLeftWall.add(lwTop);
        roomGroup.add(dryLeftWall);

        // 8. กำแพงเตี้ยกั้นโซนเปียก/แห้ง (Partition) ยื่นจากซ้ายมาขวา
        const partGeo = new THREE.BoxGeometry(partW, dadoHeight, 0.15);
        const partition = new THREE.Mesh(partGeo, terrazzoMaterial);
        partition.position.set(-w/2 + partW/2, dadoHeight/2, partZ);
        partition.castShadow = true; partition.receiveShadow = true;
        roomGroup.add(partition);
        
        // ขอบไม้ท็อปบนกำแพงกั้น
        const pTrim = new THREE.Mesh(new THREE.BoxGeometry(partW + 0.02, 0.04, 0.17), woodTrimMat);
        pTrim.position.set(-w/2 + partW/2, dadoHeight, partZ);
        pTrim.receiveShadow = true;
        roomGroup.add(pTrim);

        // 9. ประตูกระจกกั้นอาบน้ำ (วางบนท็อปไม้)
        const glassW = partW; 
        const glassH = h - dadoHeight - 0.25;
        const showerGlass = new THREE.Mesh(new THREE.BoxGeometry(glassW, glassH, 0.012), glassMat);
        showerGlass.position.set(-w/2 + partW/2, dadoHeight + 0.02 + glassH/2, partZ);
        
        // เติมเส้นขอบกระจก (Edge) สีเขียวอมฟ้า ทำให้ดูเป็นกระจกหนาและมองเห็นขอบเขตชัดเจนขึ้น
        const edgeGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(glassW, glassH, 0.012));
        const edgeMat = new THREE.LineBasicMaterial({ color: 0x88bbcc, linewidth: 2 });
        const glassEdge = new THREE.LineSegments(edgeGeo, edgeMat);
        showerGlass.add(glassEdge);
        roomGroup.add(showerGlass);
        
        // บานพับสเตนเลสยึดกระจกกับผนังซ้าย
        const hingeGeo = new THREE.BoxGeometry(0.06, 0.04, 0.04);
        const h1 = new THREE.Mesh(hingeGeo, chromeMat); h1.position.set(-w/2 + 0.03, dadoHeight + 0.3, partZ); roomGroup.add(h1);
        const h2 = new THREE.Mesh(hingeGeo, chromeMat); h2.position.set(-w/2 + 0.03, dadoHeight + glassH - 0.3, partZ); roomGroup.add(h2);
        
        // ก้านเหล็กยึดผนังด้านบน (Support Bar) ที่ลากจากขอบกระจกไปผนังไม้
        const clip = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 0.04), chromeMat);
        clip.position.set(-w/2 + glassW - 0.02, dadoHeight + 0.02 + glassH, partZ); 
        roomGroup.add(clip);

        const supportBar = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, glassW - 0.02), chromeMat);
        supportBar.rotation.z = Math.PI / 2;
        supportBar.position.set(-w/2 + (glassW - 0.02)/2, dadoHeight + 0.02 + glassH, partZ);
        roomGroup.add(supportBar);

        // 10. ชักโครก (Toilet) วางชิดผนังซ้าย หันหน้ามาทางขวา ตามที่พบได้บ่อยในแปลนแบบนี้
        // แต่จากภาพ มุมกล้องเห็นหน้าชักโครกหันออก ดังนั้นตั้งชิดผนังซ้าย หันออกข้างหน้า (Z+) แกนกล้อง
        const toilet = new THREE.Group();
        // วางด้านหน้า partition กะระยะให้พอดี
        toilet.position.set(-w/2 + 0.65, 0, partZ + 0.8); 
        
        // ฐานชักโครกโค้งมน
        const tBaseGeo = new THREE.CylinderGeometry(0.18, 0.14, 0.42, 32);
        tBaseGeo.scale(1, 1, 1.3); // รีไปด้านหลัง
        const tBase = new THREE.Mesh(tBaseGeo, whiteCeramic);
        tBase.position.set(0, 0.21, 0); tBase.castShadow = true; toilet.add(tBase);
        
        // ถังพักน้ำ (Tank)
        const tTankGeo = new THREE.BoxGeometry(0.38, 0.38, 0.2);
        const tTank = new THREE.Mesh(tTankGeo, whiteCeramic);
        tTank.position.set(0, 0.6, -0.16); tTank.castShadow = true; toilet.add(tTank);
        // ปุ่มกดคู่ (Flush button)
        const btnGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.01, 16);
        const btn = new THREE.Mesh(btnGeo, chromeMat);
        btn.rotation.x = Math.PI/2; btn.position.set(0, 0.79, -0.16); toilet.add(btn);

        // ฝารองนั่ง (Seat)
        const tSeatGeo = new THREE.TorusGeometry(0.16, 0.035, 16, 32);
        tSeatGeo.scale(1, 1.25, 1);
        const tSeat = new THREE.Mesh(tSeatGeo, whiteCeramic);
        tSeat.rotation.x = Math.PI/2; tSeat.position.set(0, 0.435, 0.02); toilet.add(tSeat);
        
        // ฝาปิด (Cover - ปิดอยู่)
        const tCoverGeo = new THREE.CylinderGeometry(0.19, 0.19, 0.025, 32);
        tCoverGeo.scale(1, 1, 1.25);
        const tCover = new THREE.Mesh(tCoverGeo, whiteCeramic);
        tCover.position.set(0, 0.46, 0.02); toilet.add(tCover);

        // เงาใต้ชักโครก
        const tShadow = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.6), new THREE.MeshBasicMaterial({color: 0x000000, transparent: true, opacity: 0.3}));
        tShadow.rotation.x = -Math.PI/2; tShadow.position.set(0, 0.005, 0); toilet.add(tShadow);

        roomGroup.add(toilet);

        // 11. ต้นไม้ (Fiddle Leaf Fig ปลอม) ข้างชักโครก
        const plant = new THREE.Group();
        plant.position.set(-w/2 + 0.3, 0, partZ + 0.3); // เข้ามุมระหว่างผนังซ้ายและ partition
        
        // กระถางมีริ้ว (Ribbed Pot)
        const potGeo = new THREE.CylinderGeometry(0.14, 0.11, 0.28, 32);
        const pot = new THREE.Mesh(potGeo, new THREE.MeshStandardMaterial({color: 0xeeeeee, roughness: 0.9}));
        pot.position.y = 0.14; pot.castShadow = true; plant.add(pot);
        
        // ใบไม้
        const leafMat = new THREE.MeshStandardMaterial({color: 0x2a3b22, roughness: 0.4, side: THREE.DoubleSide});
        for(let i=0; i<12; i++) {
            const leaf = new THREE.Mesh(new THREE.CircleGeometry(0.15, 16), leafMat);
            leaf.scale.set(0.6, 1.4, 1); // รูปทรงใบไทรใบสัก
            // โค้งใบเล็กน้อย
            const pos = new THREE.Vector3((Math.random()-0.5)*0.15, 0.35 + Math.random()*0.35, (Math.random()-0.5)*0.15);
            leaf.position.copy(pos);
            leaf.rotation.set(Math.random()*Math.PI/2 - Math.PI/4, Math.random()*Math.PI*2, Math.random()*Math.PI/4);
            leaf.castShadow = true;
            
            // ก้านเชื่อมลงดิน
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.005, 0.005, pos.y), new THREE.MeshStandardMaterial({color: 0x3d2817}));
            stem.position.set(pos.x/2, pos.y/2, pos.z/2);
            plant.add(stem);
            plant.add(leaf);
        }
        roomGroup.add(plant);

        // 12. ฝักบัวและเครื่องทำน้ำอุ่น (โซนเปียก ผนังซ้าย)
        const shower = new THREE.Group();
        // วางที่ผนังซ้าย ในโซนเปียก
        shower.position.set(-w/2 + 0.05, 0, partZ - wetDepth/2);
        
        // เครื่องทำน้ำอุ่น (กล่องขาวมุมมน ติดผนัง)
        const heaterBox = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.38, 0.08), whiteCeramic);
        heaterBox.position.set(0, 1.6, 0); shower.add(heaterBox);
        // หน้าปัด/ปุ่ม
        const dial = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.02, 32), chromeMat);
        dial.rotation.z = Math.PI/2; dial.position.set(0.04, 1.5, 0); shower.add(dial);
        const blackPanel = new THREE.Mesh(new THREE.PlaneGeometry(0.08, 0.15), new THREE.MeshBasicMaterial({color: 0x111111}));
        blackPanel.rotation.y = Math.PI/2; blackPanel.position.set(0.041, 1.65, 0); shower.add(blackPanel);

        // ท่อก้านแข็ง (Rain Shower Pipe)
        const pipeGeo = new THREE.CylinderGeometry(0.01, 0.01, 0.9, 16);
        const pipe = new THREE.Mesh(pipeGeo, chromeMat);
        pipe.position.set(0.04, 2.1, 0); shower.add(pipe);
        // ก้านยื่นออก
        const pipeExt = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.4, 16), chromeMat);
        pipeExt.rotation.x = Math.PI/2; pipeExt.position.set(0.04, 2.5, 0.2); shower.add(pipeExt);
        // หัว Rain Shower (แผ่นกลมแบน)
        const rainHead = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.015, 32), chromeMat);
        rainHead.position.set(0.04, 2.5, 0.39); shower.add(rainHead);

        // ฝักบัวสายอ่อน (Hand Shower)
        const handShower = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.04, 0.15, 16), chromeMat);
        handShower.rotation.x = Math.PI/4; handShower.position.set(0.08, 1.3, 0.1); shower.add(handShower);
        // สายฝักบัว
        class HoseCurve extends THREE.Curve {
            getPoint(t, opt = new THREE.Vector3()) {
                const x = 0.04 + Math.sin(t*Math.PI)*0.08;
                const y = 1.3 - t*0.5;
                const z = 0.02 + Math.sin(t*Math.PI)*0.05;
                return opt.set(x, y, z);
            }
        }
        const hose = new THREE.Mesh(new THREE.TubeGeometry(new HoseCurve(), 20, 0.007, 8, false), chromeMat);
        shower.add(hose);
        
        // วาล์วผสมน้ำด่านล่าง
        const valve = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.12, 16), chromeMat);
        valve.rotation.z = Math.PI/2; valve.position.set(0.04, 1.05, 0); shower.add(valve);

        roomGroup.add(shower);

        // 13. ขวดสบู่/แชมพู ใน Niche (หลากหลายสีพาสเทลและขนาด)
        const bottles = new THREE.Group();
        bottles.position.set(0, nY - nH/2 + 0.01, -d/2 - nD/2);
        
        const bColors = [0xffffff, 0xffeaea, 0xeaffea, 0xeaeaff, 0xfff5cc, 0xe0e0e0, 0xffcccc, 0x111111]; // รวมขวดดำตามภาพ
        const numBottles = 8;
        for(let i=0; i<numBottles; i++) {
            const bRadius = 0.03 + Math.random()*0.015;
            const bHeight = 0.12 + Math.random()*0.08;
            const bMat = new THREE.MeshStandardMaterial({color: bColors[i], roughness: 0.2});
            const bottle = new THREE.Mesh(new THREE.CylinderGeometry(bRadius, bRadius, bHeight, 32), bMat);
            
            // คอขวดและหัวปั๊ม
            const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, 0.02), whiteCeramic);
            neck.position.y = bHeight/2 + 0.01; bottle.add(neck);
            const pump = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.015), chromeMat);
            pump.position.y = bHeight/2 + 0.025; bottle.add(pump);
            const nozzle = new THREE.Mesh(new THREE.CylinderGeometry(0.005, 0.005, 0.03), chromeMat);
            nozzle.rotation.z = Math.PI/2; nozzle.position.set(0.015, bHeight/2 + 0.025, 0); bottle.add(nozzle);

            // เรียงแถวหน้ากระดานในช่อง
            bottle.position.set(-nW/2 + 0.15 + (i * 0.14), bHeight/2, 0);
            bottle.castShadow = true;
            bottles.add(bottle);
        }
        roomGroup.add(bottles);

        // ของเล่นเด็ก (ตัวต่อสีสัน) บนขอบหน้าต่าง
        const toyGroup = new THREE.Group();
        toyGroup.position.set(0, winY - winH/2 + 0.03, -d/2 + 0.04);
        const tBox1 = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 0.04), new THREE.MeshStandardMaterial({color: 0xff3366}));
        toyGroup.add(tBox1);
        const tBox2 = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.03, 0.03), new THREE.MeshStandardMaterial({color: 0x3366ff}));
        tBox2.position.set(0, 0.035, 0); toyGroup.add(tBox2);
        roomGroup.add(toyGroup);

        // 14. ที่ใส่กระดาษทิชชู่ (ขวามือของชักโครก ติดผนังขวา)
        const tp = new THREE.Group();
        tp.position.set(w/2 - 0.03, 0.65, partZ + 0.8);
        const tpHolder = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.1, 0.12), chromeMat);
        tp.add(tpHolder);
        const tpRoll = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.11, 32), new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 0.8}));
        tpRoll.rotation.x = Math.PI/2; tpRoll.position.set(-0.06, 0, 0); tp.add(tpRoll);
        roomGroup.add(tp);


        // แสงแวดล้อมสว่างนุ่มนวล
        const ambientLight = new THREE.AmbientLight(0xfff7ed, 0.6); 
        scene.add(ambientLight);

        // ไฟดาวน์ไลท์หลัก (กลางห้องโซนแห้ง)
        const mainLight = new THREE.PointLight(0xfff0e0, 0.8, 8);
        mainLight.position.set(0, h - 0.1, partZ + 0.5);
        mainLight.castShadow = true;
        mainLight.shadow.bias = -0.001;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        scene.add(mainLight);
        
        // ไฟดาวน์ไลท์โซนเปียก
        const showerLight = new THREE.PointLight(0xffffff, 0.5, 6);
        showerLight.position.set(0, h - 0.1, partZ - wetDepth/2);
        scene.add(showerLight);

        // เพิ่มการสะท้อนแสงบางๆ ที่กระจกกั้น
        const glassLight = new THREE.PointLight(0xffffff, 0.2, 3);
        glassLight.position.set(0, dadoHeight + 1.0, partZ + 0.5);
        scene.add(glassLight);


        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ลบหน้าจอโหลดเมื่อพร้อม
        setTimeout(() => {
            const loading = document.getElementById('loading');
            loading.style.opacity = '0';
            setTimeout(() => loading.remove(), 1000);
        }, 2000); // ให้เวลา Shader คอมไพล์สักครู่

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }

        animate();

    </script>
</body>
</html>
